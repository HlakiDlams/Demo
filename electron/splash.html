<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #080808;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  img {
    width: 160px;
    height: 160px;
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.75; transform: scale(0.94); }
  }
</style>
</head>
<body>
  <img src="../www/icons/icon-512.png" alt="HF543 Studios"/>
</body>
</html>
